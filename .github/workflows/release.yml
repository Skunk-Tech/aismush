name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04  # MUST stay 22.04 — older glibc (2.35) ensures binary runs on Debian 12+, Ubuntu 22.04+
            target: x86_64-unknown-linux-gnu
            artifact: aismush-linux-x86_64
            binary: aismush
          - os: macos-14
            target: aarch64-apple-darwin
            artifact: aismush-macos-arm64
            binary: aismush
          - os: macos-14
            target: x86_64-apple-darwin
            artifact: aismush-macos-x86_64
            binary: aismush
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: aismush-windows-x86_64
            binary: aismush.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} dist/
          cp start.sh dist/
          cp README.md dist/
          cd dist && tar czf ../${{ matrix.artifact }}.tar.gz *

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          mkdir dist
          copy target\${{ matrix.target }}\release\${{ matrix.binary }} dist\
          copy install.ps1 dist\
          copy start.ps1 dist\
          copy README.md dist\
          Compress-Archive -Path dist\* -DestinationPath ${{ matrix.artifact }}.zip

      - name: Upload artifact (Unix)
        if: matrix.os != 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

      - name: Upload artifact (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: false

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            aismush-linux-x86_64/aismush-linux-x86_64.tar.gz
            aismush-macos-arm64/aismush-macos-arm64.tar.gz
            aismush-macos-x86_64/aismush-macos-x86_64.tar.gz
            aismush-windows-x86_64/aismush-windows-x86_64.zip
          generate_release_notes: true

  # Submit to Windows Package Manager (winget)
  # Note: requires SkunkTech.AISmush to exist in winget-pkgs — submit first version manually
  winget:
    needs: release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: SkunkTech.AISmush
          installers-regex: 'aismush-windows-x86_64\.zip$'
          token: ${{ secrets.WINGET_PAT }}
          fork-user: Skunk-Tech

  # Update Scoop bucket manifest
  scoop:
    needs: release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Scoop manifest
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Download the Windows zip to compute hash
          URL="https://github.com/Skunk-Tech/aismush/releases/download/v${VERSION}/aismush-windows-x86_64.zip"
          # Wait for release assets to be available
          sleep 30
          curl -sLf "$URL" -o aismush.zip || { echo "Download failed, skipping scoop update"; exit 0; }
          HASH=$(sha256sum aismush.zip | cut -d' ' -f1)

          # Update bucket/aismush.json
          cat > bucket/aismush.json << SCOOP
          {
              "version": "${VERSION}",
              "description": "Smart AI coding proxy — cuts Claude Code costs by 90% with multi-provider routing, compression, and file caching",
              "homepage": "https://aismush.us.com",
              "license": "MIT",
              "architecture": {
                  "64bit": {
                      "url": "${URL}",
                      "hash": "${HASH}"
                  }
              },
              "bin": [
                  "aismush.exe"
              ],
              "post_install": [
                  "if (Test-Path \\"\$dir\\\\start.ps1\\") { Copy-Item \\"\$dir\\\\start.ps1\\" \\"\$dir\\\\aismush-start.ps1\\"; Set-Content \\"\$dir\\\\aismush-start.cmd\\" '@echo off\\r\\npowershell.exe -NoProfile -ExecutionPolicy Bypass -File \\"%~dp0aismush-start.ps1\\" %*' }",
                  "Write-Host 'AISmush installed! Run: aismush --setup' -ForegroundColor Green"
              ],
              "checkver": {
                  "github": "https://github.com/Skunk-Tech/aismush"
              },
              "autoupdate": {
                  "architecture": {
                      "64bit": {
                          "url": "https://github.com/Skunk-Tech/aismush/releases/download/v\$version/aismush-windows-x86_64.zip"
                      }
                  }
              }
          }
          SCOOP

          # Commit and push
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bucket/aismush.json
          git diff --cached --quiet || git commit -m "scoop: update to v${VERSION}" && git push
