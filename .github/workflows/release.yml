name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04  # MUST stay 22.04 — older glibc (2.35) ensures binary runs on Debian 12+, Ubuntu 22.04+
            target: x86_64-unknown-linux-gnu
            artifact: aismush-linux-x86_64
            binary: aismush
          - os: macos-14
            target: aarch64-apple-darwin
            artifact: aismush-macos-arm64
            binary: aismush
          - os: macos-14
            target: x86_64-apple-darwin
            artifact: aismush-macos-x86_64
            binary: aismush
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: aismush-windows-x86_64
            binary: aismush.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} dist/
          cp start.sh dist/
          cp README.md dist/
          cd dist && tar czf ../${{ matrix.artifact }}.tar.gz *

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          mkdir dist
          copy target\${{ matrix.target }}\release\${{ matrix.binary }} dist\
          copy start.ps1 dist\
          copy README.md dist\
          cd dist && tar czf ..\${{ matrix.artifact }}.tar.gz *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: false

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            aismush-linux-x86_64/aismush-linux-x86_64.tar.gz
            aismush-macos-arm64/aismush-macos-arm64.tar.gz
            aismush-macos-x86_64/aismush-macos-x86_64.tar.gz
            aismush-windows-x86_64/aismush-windows-x86_64.tar.gz
          generate_release_notes: true
